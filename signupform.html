<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>signup form</title>
   <link rel="stylesheet" href="signup.css"/> 
  
</head>

<body>
    <form id="myform">
        <!--Inline css: <h1 style="color:green;">Signup form</h1>  -->
        <h1 id="signup">Signup form</h1>
        <label>Username</label>
        <input type="text" Placeholder="Enter username" required/>
        
        <label>Email</label>
        <input type="email" placeholder="Enter email" required/>

        <label>Mobile Number</label>
        <input type="number" placeholder="Enter Mobile number" required/>
        
        
    <div id="gender">
            <input type="radio" name="gender"><span>Male</span>
            <input type="radio" name="gender"><span>Female</span>
        </div>
        <select>
            <option selected hidden>Select any one opted our websites</option>
            <option value="insta">Instagram</option>
            <option value="fb">Facebook</option>
            <option value="git">Github</option>
            <option value="linkedin">linkedin</option>
        </select>

        <div id="check">
            <input type="checkbox"/>
            <p>I accept the rules & regulations</p>
        </div>

        <textarea></textarea>

        <button>Sign up</button>
         
        <div id="links">
            <a href="forgotpassword.html">Forgot Password?</a>
            <a href="login.html">Login</a>
         </div>
    </form>
</body>
</html>
